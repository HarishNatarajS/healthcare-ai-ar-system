<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><title>ARFlow AI — Analytics</title><link rel="stylesheet" href="css/styles.css"/></head>
<body><div class="app-layout" id="app"></div>
<script src="js/shared.js"></script>
<script>
requireAuth();const DATA=loadData();
document.getElementById('app').innerHTML=renderSidebar('analytics')+`<div class="main-area">${renderTopbar('Analytics & Reports','Performance metrics and insights')}<div class="content" id="c"></div></div>`+renderToast();
const paid=DATA.filter(d=>d.claim_status==='Paid');
const unpaid=DATA.filter(d=>d.claim_status!=='Paid');
const totalBill=DATA.reduce((s,d)=>s+(d.claim_amount||0),0);
const totalRecv=DATA.reduce((s,d)=>s+(d.payment_received||0),0);
const totalBal=DATA.reduce((s,d)=>s+(d.balance_due||0),0);
const collRate=totalBill?Math.round(totalRecv/totalBill*100):0;
const denialRate=DATA.length?Math.round(DATA.filter(d=>d.denial_flag).length/DATA.length*100):0;
const avgAR=DATA.length?Math.round(DATA.reduce((s,d)=>s+(d.days_in_ar||0),0)/DATA.length):0;
const payers=[...new Set(DATA.map(d=>d.payer_type))];
const maxPayerBal=Math.max(...payers.map(p=>DATA.filter(d=>d.payer_type===p).reduce((s,d)=>s+(d.balance_due||0),0)),1);
const depts=[...new Set(DATA.map(d=>d.department))];
document.getElementById('c').innerHTML=`
<div class="kpi-grid">
  <div class="kpi" style="animation-delay:.05s"><div class="kpi-top"><div class="kpi-ic ki-g">💵</div><span class="kpi-trend t-up">${collRate}%</span></div><div class="kpi-val" id="a1">—</div><div class="kpi-lbl">Total Collected</div><div class="kpi-foot">of ${money(totalBill)} billed</div></div>
  <div class="kpi" style="animation-delay:.10s"><div class="kpi-top"><div class="kpi-ic ki-r">❌</div><span class="kpi-trend t-dn">${denialRate}%</span></div><div class="kpi-val" id="a2">—</div><div class="kpi-lbl">Denial Rate</div><div class="kpi-foot">Industry avg: 14%</div></div>
  <div class="kpi" style="animation-delay:.15s"><div class="kpi-top"><div class="kpi-ic ki-a">⏱️</div></div><div class="kpi-val" id="a3">—</div><div class="kpi-lbl">Avg Days in AR</div><div class="kpi-foot">Target: under 45 days</div></div>
  <div class="kpi" style="animation-delay:.20s"><div class="kpi-top"><div class="kpi-ic ki-t">📈</div><span class="kpi-trend t-up">${collRate}%</span></div><div class="kpi-val" id="a4">—</div><div class="kpi-lbl">Collection Rate</div><div class="kpi-foot">${paid.length} of ${DATA.length} paid</div></div>
</div>
<div class="analysis-grid">
  <div class="card"><div class="card-hd"><div><div class="card-title">Performance Breakdown</div><div class="card-sub">Full dataset</div></div></div>
    <div class="metric-list">
      ${[['Total Claims',DATA.length+' claims',''],['Paid',paid.length+' ('+Math.round(paid.length/Math.max(DATA.length,1)*100)+'%)','color:var(--green)'],['Unpaid',unpaid.length+' claims','color:var(--red)'],['High Priority',DATA.filter(d=>d.priority_label==='High').length+' claims','color:var(--red)'],['Denial Flags',DATA.filter(d=>d.denial_flag).length+' claims','color:var(--amber)'],['Total Billed',money(totalBill),'font-weight:800'],['Total Collected',money(totalRecv),'color:var(--green);font-weight:800'],['Balance Due',money(totalBal),'color:var(--red);font-weight:800']].map(([l,v,st])=>`<div class="mi"><div class="mi-l">${l}</div><div class="mi-v" style="${st}">${v}</div></div>`).join('')}
    </div>
  </div>
  <div class="card"><div class="card-hd"><div><div class="card-title">Payer Performance</div><div class="card-sub">Balance due by payer</div></div></div>
    <div class="metric-list">
      ${payers.map(p=>{const pd=DATA.filter(d=>d.payer_type===p);const bal=pd.reduce((s,d)=>s+(d.balance_due||0),0);const w=Math.round(bal/maxPayerBal*100);return`<div class="mi"><div><div class="mi-l">${p}</div><div style="font-size:11px;color:var(--muted)">${pd.length} claims</div></div><div style="text-align:right"><div class="mi-v">${money(bal)}</div><div class="prog-bar" style="width:100px;margin-top:4px"><div class="prog-fill" data-w="${w}" style="width:0%;background:var(--teal)"></div></div></div></div>`;}).join('')}
    </div>
  </div>
</div>
<div class="card"><div class="card-hd"><div><div class="card-title">Department Analysis</div><div class="card-sub">Claims breakdown by dept</div></div><button class="btn btn-outline btn-sm" onclick="exportCSV(DATA,'arflow_analytics.csv')">⬇ Export</button></div>
  <div class="tbl-wrap"><table class="tbl"><thead><tr><th>Department</th><th>Total Claims</th><th>Unpaid</th><th>Balance Due</th><th>Avg Days AR</th><th>Denial Rate</th></tr></thead><tbody>
  ${depts.map(dept=>{const dd=DATA.filter(d=>d.department===dept);const up=dd.filter(d=>d.claim_status!=='Paid');const bal=up.reduce((s,d)=>s+(d.balance_due||0),0);const avg=dd.length?Math.round(dd.reduce((s,d)=>s+(d.days_in_ar||0),0)/dd.length):0;const dr=dd.length?Math.round(dd.filter(d=>d.denial_flag).length/dd.length*100):0;return`<tr><td style="font-weight:600;font-family:var(--font-display)">${dept}</td><td style="font-weight:700">${dd.length}</td><td>${up.length}</td><td style="font-weight:700;font-family:var(--font-display);color:${bal>5000?'var(--red)':'var(--navy)'}">${money(bal)}</td><td><span style="${ageStyle(avg)}">${avg}d</span></td><td>${dr>20?`<span class="badge b-red">${dr}%</span>`:dr>10?`<span class="badge b-amb">${dr}%</span>`:`<span class="badge b-green">${dr}%</span>`}</td></tr>`;}).join('')}
  </tbody></table></div>
</div>`;
setTimeout(()=>{animateCount(document.getElementById('a1'),totalRecv,'$');animateCount(document.getElementById('a2'),denialRate,'','%');animateCount(document.getElementById('a3'),avgAR,'','d');animateCount(document.getElementById('a4'),collRate,'','%');document.querySelectorAll('.prog-fill[data-w]').forEach(b=>b.style.width=b.dataset.w+'%');},150);
</script></body></html>
