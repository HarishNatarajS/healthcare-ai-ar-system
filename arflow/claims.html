<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ARFlow AI — Claims Queue</title>
<link rel="stylesheet" href="css/styles.css"/>
<style>.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}.stat{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:15px 18px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow-sm);animation:fadeUp .4s ease both}.stat-ic{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}.stat-val{font-family:var(--font-display);font-size:20px;font-weight:800;line-height:1;color:var(--navy)}.stat-lbl{font-size:12px;color:var(--muted);margin-top:2px}</style>
</head>
<body>
<div class="app-layout" id="app"></div>
<script src="js/shared.js"></script>
<script>
requireAuth();
let DATA=loadData();
let filters={priority:'All',status:'All',payer:'All',dept:'All'};
let searchQ='',currentPage=1;
const PER=15;
document.getElementById('app').innerHTML=renderSidebar('claims')+`<div class="main-area">${renderTopbar('Claims Queue','All claims · AI-ranked by priority')}<div class="content" id="c"></div></div>`+renderFollowModal(DATA)+renderToast();
window.onGlobalSearch=q=>{searchQ=q.toLowerCase();currentPage=1;renderTable()};

function renderPage(){
  const payers=[...new Set(DATA.map(d=>d.payer_type))].sort();
  const depts=[...new Set(DATA.map(d=>d.department))].sort();
  const high=DATA.filter(d=>d.priority_label==='High').length;
  const totalBal=DATA.reduce((s,d)=>s+(d.balance_due||0),0);
  document.getElementById('c').innerHTML=`
    <div class="stat-grid">
      <div class="stat" style="animation-delay:.05s"><div class="stat-ic ki-t">📄</div><div><div class="stat-val" id="s1">—</div><div class="stat-lbl">Total Claims</div></div></div>
      <div class="stat" style="animation-delay:.10s"><div class="stat-ic ki-r">💰</div><div><div class="stat-val" id="s2">—</div><div class="stat-lbl">Total Balance Due</div></div></div>
      <div class="stat" style="animation-delay:.15s"><div class="stat-ic ki-a">🚨</div><div><div class="stat-val" id="s3">—</div><div class="stat-lbl">High Priority</div></div></div>
    </div>
    <div class="card">
      <div class="card-hd"><div><div class="card-title">All Claims</div><div class="card-sub" id="rSub">Loading…</div></div><button class="btn btn-primary btn-sm" onclick="openModal('followModal')">+ Bulk Follow-Up</button></div>
      <div class="filter-bar">
        <select class="fsel" onchange="filters.priority=this.value;currentPage=1;renderTable()"><option value="All">All Priorities</option><option value="High">🔴 High</option><option value="Medium">🟡 Medium</option><option value="Low">🟢 Low</option></select>
        <select class="fsel" onchange="filters.status=this.value;currentPage=1;renderTable()"><option value="All">All Statuses</option><option value="Pending">Pending</option><option value="In Review">In Review</option><option value="Denied">Denied</option><option value="Paid">Paid</option></select>
        <select class="fsel" onchange="filters.payer=this.value;currentPage=1;renderTable()">${['All Payers',...payers].map((p,i)=>`<option value="${i===0?'All':p}">${p}</option>`).join('')}</select>
        <select class="fsel" onchange="filters.dept=this.value;currentPage=1;renderTable()">${['All Depts',...depts].map((d,i)=>`<option value="${i===0?'All':d}">${d}</option>`).join('')}</select>
        <div class="search-box" style="flex:1;max-width:220px"><span style="color:var(--muted2)">🔍</span><input type="text" placeholder="Search claims…" oninput="searchQ=this.value.toLowerCase();currentPage=1;renderTable()"/></div>
        <button class="btn btn-outline btn-sm" onclick="exportCSV(DATA,'arflow_claims.csv')">⬇ Export</button>
      </div>
      <div id="tWrap"></div>
    </div>`;
  setTimeout(()=>{animateCount(document.getElementById('s1'),DATA.length);animateCount(document.getElementById('s2'),totalBal,'$');animateCount(document.getElementById('s3'),high)},150);
  renderTable();
}

function getFiltered(){return DATA.filter(r=>(filters.priority==='All'||r.priority_label===filters.priority)&&(filters.status==='All'||r.claim_status===filters.status)&&(filters.payer==='All'||r.payer_type===filters.payer)&&(filters.dept==='All'||r.department===filters.dept)&&(!searchQ||JSON.stringify(r).toLowerCase().includes(searchQ))).sort((a,b)=>({High:3,Medium:2,Low:1}[b.priority_label]||0)-({High:3,Medium:2,Low:1}[a.priority_label]||0)||b.balance_due-a.balance_due);}

function renderTable(){
  const rows=getFiltered();const start=(currentPage-1)*PER;const page=rows.slice(start,start+PER);
  const sub=document.getElementById('rSub');if(sub)sub.textContent=`${rows.length} results · AI-ranked`;
  const wrap=document.getElementById('tWrap');if(!wrap)return;
  if(!page.length){wrap.innerHTML=`<div class="empty"><div class="empty-ic">🔍</div><div class="empty-ti">No claims found</div><p>Adjust your filters</p></div>`;return;}
  wrap.innerHTML=`<div class="tbl-wrap"><table class="tbl"><thead><tr><th>#</th><th>Claim ID</th><th>Patient</th><th>City</th><th>Service</th><th>Dept</th><th>Payer</th><th>Claim Amt</th><th>Balance Due</th><th>Days AR</th><th>Follow-Ups</th><th>Denial</th><th>Priority</th><th>Status</th><th>Risk</th><th>Actions</th></tr></thead><tbody>
  ${page.map((r,i)=>{const rank=start+i+1;const rc=rank===1?'r1':rank===2?'r2':rank===3?'r3':'ro';const sc=riskScore(r);const scC=sc>=75?'var(--red)':sc>=50?'var(--amber)':'var(--green)';
  return `<tr><td><div class="rank-num ${rc}">${rank}</div></td><td><span style="color:var(--teal);font-weight:700;font-size:12px;font-family:var(--font-display)">${r.claim_id}</span></td><td style="font-size:12px;color:var(--muted)">${r.patient_id}<br/><span style="font-size:10px">${r.patient_gender},${r.patient_age}y</span></td><td style="font-size:12px;color:var(--muted)">${r.patient_city||'—'}</td><td><span class="badge b-gray" style="font-size:10px">${r.service_type}</span></td><td style="font-size:12px;color:var(--muted)">${r.department}</td><td style="font-size:12px;font-weight:600">${r.payer_type}</td><td style="font-weight:600;font-family:var(--font-display)">${money(r.claim_amount)}</td><td style="font-weight:700;font-family:var(--font-display);color:${r.balance_due>10000?'var(--red)':'var(--navy)'}">${money(r.balance_due)}</td><td><span style="${ageStyle(r.days_in_ar)}">${r.days_in_ar}d</span></td><td style="text-align:center;font-weight:600">${r.followup_count}</td><td style="text-align:center">${r.denial_flag?'<span class="badge b-red" style="font-size:10px">Yes</span>':'<span class="badge b-gray" style="font-size:10px">No</span>'}</td><td>${prioBadge(r.priority_label)}</td><td>${statusBadge(r.claim_status)}</td><td><div class="risk-wrap"><div class="risk-bar"><div class="risk-fill" style="width:${sc}%;background:${scC}"></div></div><span class="risk-val" style="color:${scC}">${sc}</span></div></td><td style="display:flex;gap:5px"><a href="tracker.html?id=${r.claim_id}" class="act-btn">Track</a><button class="act-btn" onclick="showToast('Follow-up sent for ${r.claim_id}!')">FU</button></td></tr>`;
  }).join('')}</tbody></table></div>${renderPag(rows.length)}`;
}
function renderPag(total){const pages=Math.ceil(total/PER);if(pages<=1)return'';const s=(currentPage-1)*PER+1,e=Math.min(currentPage*PER,total);let b=`<button class="pb" ${currentPage===1?'disabled':''} onclick="currentPage--;renderTable()">← Prev</button>`;for(let p=1;p<=pages;p++){if(p===1||p===pages||Math.abs(p-currentPage)<=1)b+=`<button class="pb ${p===currentPage?'on':''}" onclick="currentPage=${p};renderTable()">${p}</button>`;else if(Math.abs(p-currentPage)===2)b+=`<span style="padding:5px 3px;color:var(--muted2)">…</span>`;}b+=`<button class="pb" ${currentPage===pages?'disabled':''} onclick="currentPage++;renderTable()">Next →</button>`;return`<div class="pag"><div class="pag-info">Showing ${s}–${e} of ${total}</div><div class="pag-btns">${b}</div></div>`;}
renderPage();
</script>
</body>
</html>
