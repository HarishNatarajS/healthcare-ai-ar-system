<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ARFlow AI — Upload CSV</title>
<link rel="stylesheet" href="css/styles.css"/>
<style>
.upload-wrap{max-width:680px;margin:0 auto}
.upload-zone{border:2px dashed var(--border2);border-radius:var(--r);padding:40px 20px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg);position:relative;margin-bottom:18px}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--teal);background:var(--teal-lt)}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.fp{display:none;background:var(--green-lt);border:1px solid var(--green-md);border-radius:var(--r-sm);padding:11px 14px;margin-bottom:16px;align-items:center;gap:10px}
.fp.show{display:flex}
.fp-rm{background:none;border:none;cursor:pointer;color:var(--muted2);font-size:17px;padding:2px 6px;border-radius:4px;margin-left:auto}
.fp-rm:hover{color:var(--red)}
.col-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.col-item{display:flex;align-items:center;gap:6px;background:var(--white);border:1px solid var(--border);border-radius:5px;padding:5px 8px}
.col-dot{width:5px;height:5px;border-radius:50%;background:var(--teal);flex-shrink:0}
.col-name{font-weight:700;color:var(--teal);font-size:10px;font-family:var(--font-display)}
.step-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px}
.step-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:16px;text-align:center;animation:fadeUp .5s ease both;box-shadow:var(--shadow-sm)}
.step-num{width:30px;height:30px;border-radius:50%;background:var(--teal-lt);color:var(--teal);font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-family:var(--font-display)}
.upload-submit{width:100%;padding:13px;background:linear-gradient(135deg,var(--teal),var(--teal-d));color:#fff;border:none;border-radius:var(--r-sm);font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:var(--shadow-teal);font-family:var(--font-body);display:flex;align-items:center;justify-content:center;gap:10px}
.upload-submit:hover:not(:disabled){background:linear-gradient(135deg,var(--teal-d),#074547);transform:translateY(-1px)}
.upload-submit:disabled{opacity:.6;cursor:not-allowed}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
</style>
</head>
<body>
<div class="app-layout" id="app"></div>
<script src="js/shared.js"></script>
<script>
requireAuth();
const DATA=loadData();
document.getElementById('app').innerHTML=renderSidebar('upload')+`<div class="main-area">${renderTopbar('Upload Claims CSV','Import & parse your dataset · auto-detects separator')}<div class="content"><div class="upload-wrap" id="c"></div></div></div>`+renderToast();
const COLS=['claim_id','patient_id','patient_age','patient_gender','patient_city','service_type','department','payer_type','insurance_company','claim_amount','approved_amount','payment_received','balance_due','claim_status','days_in_ar','followup_count','last_followup_days','denial_flag','priority_label'];
document.getElementById('c').innerHTML=`
<div style="text-align:center;margin-bottom:28px;animation:fadeUp .4s ease both">
  <div class="badge b-teal" style="font-size:12px;padding:5px 14px;margin-bottom:14px">📂 CSV / TSV Upload · Auto-Parse</div>
  <h2 style="font-family:var(--font-display);font-size:26px;font-weight:800;letter-spacing:-.5px;margin-bottom:8px;color:var(--navy)">Upload Your Claims Dataset</h2>
  <p style="font-size:14px;color:var(--muted);max-width:460px;margin:0 auto;line-height:1.6">Drop your 19-column file — the AI engine will score every claim by priority instantly.</p>
</div>
<div class="card" style="animation:fadeUp .5s ease .1s both">
  <div style="background:linear-gradient(135deg,var(--teal),var(--teal-d));border-radius:var(--r-sm);padding:20px 22px;color:#fff;margin-bottom:20px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:5px"><span style="font-size:20px">📊</span><div style="font-family:var(--font-display);font-size:16px;font-weight:800">Import Claims CSV</div></div>
    <div style="font-size:13px;opacity:.85">Supports tab-separated (.tsv) and comma-separated (.csv) · auto-detects format</div>
  </div>
  <div class="upload-zone" id="dz"><input type="file" accept=".csv,.tsv,.txt" id="csvFile" onchange="handleFile(this)"/>
    <span style="font-size:44px;margin-bottom:12px;display:block">📂</span>
    <div style="font-family:var(--font-display);font-size:16px;font-weight:700;margin-bottom:6px">Drop your CSV / TSV file here</div>
    <div style="font-size:13px;color:var(--muted)">or click to browse · auto-detects separator</div>
  </div>
  <div class="fp" id="fp"><span style="font-size:20px">📄</span><div style="flex:1"><div style="font-size:13px;font-weight:700" id="fpName">—</div><div style="font-size:11px;color:var(--muted)" id="fpSize">—</div></div><button class="fp-rm" onclick="clearFile()">✕</button></div>
  <div style="background:#f0fafa;border:1px solid var(--teal-md);border-radius:var(--r-sm);padding:14px 16px;margin-bottom:16px">
    <div style="font-size:11px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">📋 Expected Columns (19)</div>
    <div class="col-grid">${COLS.map(c=>`<div class="col-item"><div class="col-dot"></div><span class="col-name">${c}</span></div>`).join('')}</div>
  </div>
  <button class="upload-submit" id="upBtn" disabled onclick="processUpload()"><div class="spinner" id="sp"></div><span id="bTxt">📂 Parse & Load Dataset</span></button>
</div>
<div class="step-grid">
  ${[['📂','1','Upload CSV','Drop your claims export file'],['🤖','2','AI Scores','Priority scored automatically'],['🎯','3','Follow Up','Ranked claims ready instantly']].map(([ic,n,ti,su],i)=>`<div class="step-card" style="animation-delay:${.2+i*.08}s"><div class="step-num">${n}</div><div style="font-size:26px;margin-bottom:8px">${ic}</div><div style="font-family:var(--font-display);font-size:13px;font-weight:700;margin-bottom:4px">${ti}</div><div style="font-size:11px;color:var(--muted)">${su}</div></div>`).join('')}
</div>`;

const dz=document.getElementById('dz');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over')});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
let csvFile=null;
function handleFile(input){csvFile=input.files[0];if(!csvFile)return;document.getElementById('fpName').textContent=csvFile.name;document.getElementById('fpSize').textContent=(csvFile.size/1024).toFixed(1)+' KB';document.getElementById('fp').classList.add('show');dz.style.display='none';document.getElementById('upBtn').disabled=false;}
function clearFile(){csvFile=null;document.getElementById('csvFile').value='';document.getElementById('fp').classList.remove('show');dz.style.display='block';document.getElementById('upBtn').disabled=true;}
function processUpload(){
  if(!csvFile)return;
  document.getElementById('sp').style.display='block';document.getElementById('bTxt').textContent='⏳ Parsing…';document.getElementById('upBtn').disabled=true;
  const r=new FileReader();r.onload=e=>{try{const txt=e.target.result;const sep=txt.includes('\t')?'\t':',';const lines=txt.trim().split('\n');const hdrs=lines[0].split(sep).map(h=>h.trim().replace(/"/g,''));const rows=lines.slice(1).map(line=>{const vals=line.split(sep).map(v=>v.trim().replace(/"/g,''));const obj={};hdrs.forEach((h,i)=>{obj[h]=isNaN(vals[i])?vals[i]:parseFloat(vals[i])});return obj}).filter(r=>r.claim_id);if(!rows.length)throw new Error('No valid rows');const preview = rows.slice(0,500);saveData(preview);showToast(`✅ ${rows.length} claims loaded!`);setTimeout(()=>window.location.href='claims.html',1200);}catch(err){showToast('❌ '+err.message);document.getElementById('sp').style.display='none';document.getElementById('bTxt').textContent='📂 Parse & Load Dataset';document.getElementById('upBtn').disabled=false;}};r.readAsText(csvFile);
}
</script>
</body>
</html>
